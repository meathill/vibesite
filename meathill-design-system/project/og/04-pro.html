<!doctype html>
<!-- @dsCard group="Brand" name="OG image — Pro / pricing" viewport="1200x630" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>OG · Pro</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="og.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/fill/style.css">
<style>
  body { background: var(--background); }
  .glow {
    position: absolute; left: 50%; top: 12%;
    transform: translateX(-50%);
    width: 800px; height: 400px;
    background: radial-gradient(circle, oklch(0.62 0.22 32 / 32%) 0%, transparent 70%);
    filter: blur(60px);
    z-index: 0;
  }
</style>
</head>
<body>
  <div class="og-bg"></div>
  <div class="glow"></div>
  <div class="og-top-line"></div>
  <div class="og-frame" style="align-items: center; justify-content: center; text-align: center; padding: 60px;">

    <!-- Brand pinned top-left -->
    <div class="og-brand" style="position: absolute; top: 48px; left: 64px;">
      <div class="mark">M</div>
      Meathill
    </div>

    <!-- Big star + title -->
    <div style="display: flex; flex-direction: column; align-items: center; gap: 24px;">
      <div style="color: var(--brand-600); font-size: 54px;">
        <i class="ph-fill ph-sparkle"></i>
      </div>
      <div class="og-eyebrow" style="background: oklch(0.62 0.22 32 / 12%); color: var(--brand-700); padding: 6px 16px; border-radius: 99px; font-size: 14px;">
        ★ Most popular plan
      </div>
      <h1 class="og-title" style="margin: 0; font-size: 92px; line-height: 1.0;">
        Meathill <span style="color: var(--brand-600);">Pro</span>
      </h1>
      <p class="og-subtitle" style="margin: 0; font-size: 22px; max-width: 720px; line-height: 1.45;">
        Unlimited downloads · 10 GB max file · 4K HDR · full agent stack.
      </p>

      <!-- Price block -->
      <div style="display: flex; align-items: baseline; gap: 12px; margin-top: 12px;">
        <span style="font-family: var(--font-display); font-size: 76px; font-weight: 700; color: var(--foreground); letter-spacing: -0.025em;">$9</span>
        <span style="font-family: var(--font-sans); font-size: 22px; color: var(--muted-foreground);">/ month</span>
        <span style="margin-left: 12px; font-family: var(--font-mono); font-size: 14px; color: var(--brand-700); background: oklch(0.62 0.22 32 / 10%); padding: 4px 10px; border-radius: 99px;">
          $90/yr → 2 months free
        </span>
      </div>
    </div>

    <!-- URL bottom-right -->
    <div class="og-url" style="position: absolute; bottom: 48px; right: 64px; font-size: 18px;">meathill.com/pricing</div>

  </div>
</body>
</html>
