<!doctype html>

<html lang="en">
<head>

<title>OG · Default</title>
<link rel="stylesheet" href="../colors_and_type.css">

</head>
<body>
  <div class="og-bg"></div>
  <div class="og-top-line"></div>
  <div class="og-grid"></div>
  <div class="og-frame">

    <!-- Brand -->
    <div class="og-brand">
      <div class="mark">M</div>
      Meathill

    <!-- Title block -->
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 920px;">
      <div class="og-eyebrow">Functional SaaS · edge-deployed</div>
      <h1 class="og-title" style="margin: 18px 0 0; font-size: 84px; line-height: 1.02;">
        Download anything,<br>
        <span style="color: var(--brand-600);">at edge speed.</span>
      </h1>
      <p class="og-subtitle" style="margin-top: 20px; font-size: 22px; line-height: 1.45; max-width: 700px;">
        Cloudflare Workers control plane · Mac mini worker fleet · signed end-to-end.
      </p>
    </div>

    <!-- Footer -->
    <div class="og-footer-row">
      <div style="display: flex; gap: 24px; align-items: center; white-space: nowrap;">
        <span>↓ <strong>12M+</strong> downloads</span>
        <span>·</span>
        <span><strong>4K HDR</strong></span>
        <span>·</span>
        <span><strong>$0</strong> to start</span>

      <div class="og-url">meathill.com</div>
    </div>

  </div>
