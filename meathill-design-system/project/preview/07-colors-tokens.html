<!doctype html>
<!-- @dsCard group="Colors" name="Semantic tokens" subtitle="–background, –primary, –muted, etc." viewport="700x360" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic tokens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 18px; }
  .row {
    display: grid;
    grid-template-columns: 26px 1fr;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--neutral-700);
  }
  .swatch-sm {
    width: 26px; height: 26px;
    border-radius: var(--radius-sm);
    border: 1px solid oklch(0.20 0.05 28 / 6%);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
  }
  .row b { color: var(--neutral-900); font-weight: 600; }
  .group-label {
    grid-column: 1 / -1;
    font-family: var(--font-sans);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    color: var(--muted-foreground);
    margin-top: 6px;
  }
</style>
</head>
<body class="card">
  <div class="list">
    <div class="group-label">Surface</div>
    <div class="row"><div class="swatch-sm" style="background: var(--background)"></div><span><b>--background</b>  neutral-50</span></div>
    <div class="row"><div class="swatch-sm" style="background: var(--card)"></div><span><b>--card</b>  neutral-0</span></div>
    <div class="row"><div class="swatch-sm" style="background: var(--surface-sunken)"></div><span><b>--surface-sunken</b>  inset</span></div>
    <div class="row"><div class="swatch-sm" style="background: var(--popover); box-shadow: var(--shadow-md);"></div><span><b>--popover</b>  + shadow-md</span></div>

    <div class="group-label">Foreground</div>
    <div class="row"><div class="swatch-sm" style="background: var(--foreground)"></div><span><b>--foreground</b>  neutral-900</span></div>
    <div class="row"><div class="swatch-sm" style="background: var(--muted-foreground)"></div><span><b>--muted-foreground</b>  neutral-500</span></div>
    <div class="row"><div class="swatch-sm" style="background: var(--neutral-400)"></div><span>placeholder  neutral-400</span></div>
    <div class="row"><div class="swatch-sm" style="background: var(--border)"></div><span><b>--border / --input</b></span></div>

    <div class="group-label">Action</div>
    <div class="row"><div class="swatch-sm" style="background: var(--primary)"></div><span><b>--primary</b>  brand-500</span></div>
    <div class="row"><div class="swatch-sm" style="background: var(--primary-hover)"></div><span><b>--primary-hover</b>  brand-600</span></div>
    <div class="row"><div class="swatch-sm" style="background: var(--accent)"></div><span><b>--accent</b>  brand-tinted</span></div>
    <div class="row"><div class="swatch-sm" style="background: var(--ring)"></div><span><b>--ring</b>  focus</span></div>
  </div>
</body>
</html>
