<!doctype html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="Radius scale — sm → 3xl" viewport="700x240" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .item { text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); }
  .shape {
    height: 64px;
    background: var(--neutral-100);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    box-shadow: var(--shadow-xs);
  }
  .item b { display: block; font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--neutral-900); margin-top: 2px; }
  .legend {
    margin-top: 14px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--neutral-700);
  }
  .legend b { color: var(--neutral-900); font-weight: 600; }
</style>
</head>
<body class="card">
  <div class="grid">
    <div class="item">
      <div class="shape" style="border-radius: 0"></div>
      <b>none</b>0
    </div>
    <div class="item">
      <div class="shape" style="border-radius: var(--radius-sm)"></div>
      <b>sm</b>8px
    </div>
    <div class="item">
      <div class="shape" style="border-radius: var(--radius-md)"></div>
      <b>md</b>10px
    </div>
    <div class="item">
      <div class="shape" style="border-radius: var(--radius-lg)"></div>
      <b>lg</b>12px · buttons
    </div>
    <div class="item">
      <div class="shape" style="border-radius: var(--radius-xl)"></div>
      <b>xl</b>16px · inputs
    </div>
    <div class="item">
      <div class="shape" style="border-radius: var(--radius-2xl)"></div>
      <b>2xl</b>20px · cards
    </div>
    <div class="item">
      <div class="shape" style="border-radius: var(--radius-3xl)"></div>
      <b>3xl</b>24px · hero
    </div>
  </div>
  <p class="legend">
    Default <b>--radius = 12px</b>; every other step is a calc() off the base — change one
    var and the whole system scales. Cards always sit one notch above buttons (<b>2xl</b> vs <b>lg</b>).
    Pills and avatars use <b>--radius-full</b>.
  </p>
</body>
</html>
