<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4 → 96px on the 4px unit" viewport="700x290" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row {
    display: grid;
    grid-template-columns: 60px 1fr 90px;
    align-items: center;
    gap: 14px;
    padding: 5px 0;
  }
  .name { font-family: var(--font-mono); font-size: 11.5px; color: var(--neutral-900); font-weight: 600; }
  .bar {
    height: 16px;
    background: linear-gradient(90deg, var(--brand-400), var(--brand-600));
    border-radius: 4px;
  }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); text-align: right; }
</style>
</head>
<body class="card">
  <div class="row"><span class="name">space-1</span><div class="bar" style="width: 4px"></div><span class="px">4px · 0.25rem</span></div>
  <div class="row"><span class="name">space-2</span><div class="bar" style="width: 8px"></div><span class="px">8px · 0.5rem</span></div>
  <div class="row"><span class="name">space-3</span><div class="bar" style="width: 12px"></div><span class="px">12px · 0.75rem</span></div>
  <div class="row"><span class="name">space-4</span><div class="bar" style="width: 16px"></div><span class="px">16px · 1rem</span></div>
  <div class="row"><span class="name">space-6</span><div class="bar" style="width: 24px"></div><span class="px">24px · 1.5rem</span></div>
  <div class="row"><span class="name">space-8</span><div class="bar" style="width: 32px"></div><span class="px">32px · 2rem</span></div>
  <div class="row"><span class="name">space-12</span><div class="bar" style="width: 48px"></div><span class="px">48px · 3rem</span></div>
  <div class="row"><span class="name">space-16</span><div class="bar" style="width: 64px"></div><span class="px">64px · 4rem</span></div>
  <div class="row"><span class="name">space-24</span><div class="bar" style="width: 96px"></div><span class="px">96px · 6rem</span></div>
</body>
</html>
