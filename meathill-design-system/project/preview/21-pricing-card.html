<!doctype html>
<!-- @dsCard group="Components" name="Pricing card" subtitle="Free + Pro with featured ribbon" viewport="700x380" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pricing card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body.card { background: var(--neutral-100); padding: 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .plan {
    position: relative;
    background: var(--neutral-0);
    border: 1px solid var(--border);
    border-radius: var(--radius-3xl);
    padding: 22px 22px 20px;
  }
  .plan.featured {
    border: 2px solid oklch(0.58 0.22 28 / 35%);
    background: linear-gradient(180deg, oklch(0.97 0.012 28 / 80%), var(--neutral-0) 60%);
    box-shadow: var(--shadow-primary-lg);
  }
  .plan h3 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0; }
  .price { margin: 6px 0 4px; }
  .price .big { font-family: var(--font-display); font-size: 38px; font-weight: 700; letter-spacing: -0.02em; }
  .price .per { color: var(--muted-foreground); font-size: 13px; margin-left: 6px; }
  .features { list-style: none; margin: 14px 0 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .features li { font-size: 13px; color: var(--neutral-800); display: flex; align-items: center; gap: 8px; }
  .features svg { flex: 0 0 14px; }
  .cta { display: block; width: 100%; height: 38px; margin-top: 16px; border-radius: var(--radius-lg); font-weight: 600; font-size: 13.5px; cursor: pointer; border: 0; font-family: inherit; }
  .cta-primary { background: var(--primary); color: white; box-shadow: var(--shadow-primary); }
  .cta-outline { background: var(--neutral-0); color: var(--neutral-900); border: 1px solid var(--border); }
  .ribbon {
    position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
    background: var(--brand-gradient); color: white;
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 12px; border-radius: var(--radius-full);
    box-shadow: var(--shadow-primary);
  }
</style>
</head>
<body class="card">
  <div class="grid">
    <div class="plan">
      <h3>Free</h3>
      <div class="price"><span class="big">$0</span><span class="per">/ month</span></div>
      <button class="cta cta-outline">Get started</button>
      <ul class="features">
        <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l4 4 10-10"/></svg>10 downloads / day</li>
        <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l4 4 10-10"/></svg>100 MB max file</li>
        <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l4 4 10-10"/></svg>HD up to 1080p</li>
        <li style="color: var(--muted-foreground);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M6 18 18 6"/></svg>CLI &amp; MCP access</li>
      </ul>
    </div>
    <div class="plan featured">
      <span class="ribbon">Most popular</span>
      <h3>Pro</h3>
      <div class="price"><span class="big">$9</span><span class="per">/ month</span></div>
      <button class="cta cta-primary">Upgrade to Pro</button>
      <ul class="features">
        <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l4 4 10-10"/></svg>Unlimited downloads</li>
        <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l4 4 10-10"/></svg>10 GB max file</li>
        <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l4 4 10-10"/></svg>Up to 4K HDR</li>
        <li><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l4 4 10-10"/></svg>CLI &amp; MCP access</li>
      </ul>
    </div>
  </div>
</body>
</html>
