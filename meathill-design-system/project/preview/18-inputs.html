<!doctype html>
<!-- @dsCard group="Components" name="Inputs & form fields" subtitle="default · icon · focus · invalid · disabled" viewport="700x320" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .field {
    display: grid; grid-template-columns: 130px 1fr 180px;
    align-items: center; gap: 14px;
  }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--neutral-900); font-weight: 600; }
  .help  { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted-foreground); }

  .input {
    width: 100%; height: 34px;
    padding: 0 12px;
    background: var(--neutral-0);
    color: var(--neutral-900);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    font-family: var(--font-sans); font-size: 13.5px;
    box-shadow: 0 1px 0 oklch(0.20 0.05 28 / 5%);
    outline: none;
    transition: all var(--duration-fast) var(--ease-out);
  }
  .input::placeholder { color: var(--neutral-400); }
  .input:focus, .input.focus {
    border-color: var(--ring);
    box-shadow: 0 0 0 3px oklch(0.58 0.22 28 / 18%);
  }
  .input.invalid {
    border-color: var(--destructive);
    box-shadow: 0 0 0 3px oklch(0.50 0.23 24 / 14%);
  }
  .input.disabled {
    background: var(--neutral-100);
    color: var(--neutral-400);
    cursor: not-allowed;
  }
  .input-group {
    display: flex; align-items: center;
    background: var(--neutral-0);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding-left: 10px;
    box-shadow: 0 1px 0 oklch(0.20 0.05 28 / 5%);
  }
  .input-group svg { flex: 0 0 16px; opacity: 0.5; }
  .input-group input { border: 0; box-shadow: none; flex: 1; height: 34px; padding-left: 8px; background: transparent; font: inherit; outline: none; }
</style>
</head>
<body class="card">
  <div class="stack">
    <div class="field">
      <span class="label">default</span>
      <input class="input" placeholder="https://x.com/user/status/1234567890">
      <span class="help">36px · radius-lg</span>
    </div>
    <div class="field">
      <span class="label">with icon</span>
      <div class="input-group">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="Search downloads">
      </div>
      <span class="help">leading slot 24px</span>
    </div>
    <div class="field">
      <span class="label">focused</span>
      <input class="input focus" value="https://youtu.be/dQw4w9WgXcQ" readonly>
      <span class="help">ring 3px · brand/18%</span>
    </div>
    <div class="field">
      <span class="label">invalid</span>
      <input class="input invalid" value="not-a-valid-url">
      <span class="help">danger ring · helper below</span>
    </div>
    <div class="field">
      <span class="label">disabled</span>
      <input class="input disabled" value="account@example.com" disabled>
      <span class="help">neutral-100 fill</span>
    </div>
  </div>
</body>
</html>
