<!doctype html>
<!-- @dsCard group="UI Kit — App Dashboard" name="UI Kit — App dashboard" subtitle="Sidebar · composer · live task table with state transitions" viewport="1280x800" -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meathill · Dashboard</title>
<link rel="icon" href="../../assets/favicon.svg">

<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="app.css">
<link rel="stylesheet" href="../../shared/theme-toggle.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/fill/style.css">

<script src="../../shared/theme-toggle.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="App — Dashboard">
  <div id="app"></div>

  <script type="text/babel" src="../../shared/ThemeToggle.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="TopBar.jsx"></script>
  <script type="text/babel" src="StatsRow.jsx"></script>
  <script type="text/babel" src="Composer.jsx"></script>
  <script type="text/babel" src="TaskTable.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const seed = [
      { id: 1942, url: 'https://x.com/sama/status/1855293482948192834',
        status: 'done', stage: null, createdAt: Date.now() - 1000*60*4,
        platformIcon: 'ph-x-logo', platformColor: '#14171A' },
      { id: 1941, url: 'https://youtu.be/dQw4w9WgXcQ?t=42',
        status: 'running', stage: 'transcoding', createdAt: Date.now() - 1000*60*8,
        platformIcon: 'ph-youtube-logo', platformColor: '#FF0000' },
      { id: 1940, url: 'https://www.instagram.com/reel/Cz_8eK9PrGy/',
        status: 'queued', stage: null, createdAt: Date.now() - 1000*60*12,
        platformIcon: 'ph-instagram-logo', platformColor: '#E1306C' },
      { id: 1939, url: 'https://www.tiktok.com/@nasa/video/7421039482034812',
        status: 'failed', stage: null, createdAt: Date.now() - 1000*60*22,
        platformIcon: 'ph-tiktok-logo', platformColor: '#000000' },
      { id: 1938, url: 'https://x.com/elonmusk/status/1854012948192834012',
        status: 'done', stage: null, createdAt: Date.now() - 1000*60*60,
        platformIcon: 'ph-x-logo', platformColor: '#14171A' },
      { id: 1937, url: 'https://www.youtube.com/watch?v=jNQXAC9IVRw',
        status: 'done', stage: null, createdAt: Date.now() - 1000*60*90,
        platformIcon: 'ph-youtube-logo', platformColor: '#FF0000' },
    ];

    function App() {
      const [tasks, setTasks] = useState(seed);
      const [showBanner, setShowBanner] = useState(true);
      const [toast, setToast] = useState(null);

      function addTask(req) {
        const id = Math.max(...tasks.map(t => t.id)) + 1;
        const newTask = {
          id, url: req.url, status: 'queued', stage: null,
          createdAt: Date.now(),
          platformIcon: req.icon, platformColor: req.color,
        };
        setTasks([newTask, ...tasks]);
        setToast({ msg: `Job #${id} queued · ${req.resolution === 'audio' ? 'audio' : req.resolution + 'p'}` });
        setTimeout(() => setToast(null), 2800);

        // Simulate transitions
        setTimeout(() => setTasks(ts => ts.map(t => t.id === id ? { ...t, status: 'running', stage: 'downloading' } : t)), 1200);
        setTimeout(() => setTasks(ts => ts.map(t => t.id === id ? { ...t, status: 'running', stage: 'transcoding' } : t)), 3200);
        setTimeout(() => setTasks(ts => ts.map(t => t.id === id ? { ...t, status: 'done', stage: null } : t)), 5200);
      }
      function retry(id) {
        setTasks(ts => ts.map(t => t.id === id ? { ...t, status: 'queued' } : t));
        setToast({ msg: `Job #${id} re-queued` });
        setTimeout(() => setToast(null), 2400);
      }
      function del(id) {
        setTasks(ts => ts.filter(t => t.id !== id));
        setToast({ msg: `Job #${id} deleted` });
        setTimeout(() => setToast(null), 2000);
      }

      return (
        <>
          <Sidebar active="downloads" />
          <div className="main">
            <TopBar section="Downloads" />
            <div className="content">
              <div className="page-head">
                <h1>Welcome back, Meathill.</h1>
                <p>Your downloads, jobs in flight, and recent failures.</p>
              </div>
              <StatsRow tasks={tasks} isPro={false} />
              <UpgradeBanner visible={showBanner} onDismiss={() => setShowBanner(false)} />
              <Composer onSubmit={addTask} />
              <TaskTable tasks={tasks} onRetry={retry} onDelete={del} />
            </div>
          </div>
          {toast && (
            <div className="toast">
              <i className="ph-fill ph-check-circle"></i>
              {toast.msg}
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
