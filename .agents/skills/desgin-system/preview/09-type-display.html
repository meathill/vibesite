<!doctype html>
<!-- @dsCard group="Type" name="Type — display scale" subtitle="h1 → h5 specimens" viewport="700x360" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type display scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .row {
    display: grid;
    grid-template-columns: 1fr 110px;
    gap: 18px;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted-foreground); text-align: right; }
  .meta b { display: block; color: var(--neutral-900); font-family: var(--font-sans); font-size: 11.5px; font-weight: 600; }
  h1, h2, h3, h4, h5 { margin: 0; color: var(--neutral-900); }
  h1 { font-size: 48px; }   /* clamp suspended for spec card */
</style>
</head>
<body class="card">
  <div class="row"><h1>Download anything.</h1>            <div class="meta"><b>h1 · 48 / 1.1</b>Sora 700 · -0.02em</div></div>
  <div class="row"><h2>How it works</h2>                  <div class="meta"><b>h2 · 36 / 1.25</b>Sora 700 · -0.02em</div></div>
  <div class="row"><h3>Built for AI agents</h3>           <div class="meta"><b>h3 · 30 / 1.25</b>Sora 600</div></div>
  <div class="row"><h4>Premium plan</h4>                  <div class="meta"><b>h4 · 24 / 1.25</b>Sora 600</div></div>
  <div class="row"><h5>Recent downloads</h5>              <div class="meta"><b>h5 · 20 / 1.4</b>Jakarta 600</div></div>
</body>
</html>
