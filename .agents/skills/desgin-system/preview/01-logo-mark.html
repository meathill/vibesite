<!doctype html>
<!-- @dsCard group="Brand" name="Logo — mark" subtitle="Mark on light, tinted, dark, gradient" viewport="700x380" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo — mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tile {
    border-radius: var(--radius-xl);
    border: 1px solid var(--border);
    height: 160px;
    display: grid;
    place-items: center;
    position: relative;
    overflow: hidden;
  }
  .tile.light { background: var(--neutral-50); }
  .tile.tinted { background: oklch(0.97 0.012 28); }
  .tile.dark { background: oklch(0.16 0.012 30); border-color: oklch(0.28 0.010 30); }
  .tile.gradient { background: var(--brand-gradient); }
  .tile img { height: 64px; width: auto; }
  .tile .badge {
    position: absolute; top: 8px; left: 10px;
    font-family: var(--font-mono); font-size: 10px;
    color: var(--muted-foreground);
  }
  .tile.dark .badge,
  .tile.gradient .badge { color: rgba(255,255,255,0.7); }
</style>
</head>
<body class="card">
  <div class="grid-2">
    <div class="tile light">
      <span class="badge">on neutral-50</span>
      <img src="../assets/logo-mark.svg" alt="Meathill mark">
    </div>
    <div class="tile tinted">
      <span class="badge">on brand-50</span>
      <img src="../assets/logo-mark.svg" alt="Meathill mark">
    </div>
    <div class="tile dark">
      <span class="badge">on dark</span>
      <img src="../assets/logo-mark-dark.svg" alt="Meathill mark — dark">
    </div>
    <div class="tile gradient">
      <span class="badge">on brand-gradient</span>
      <img src="../assets/logo-mark.svg" alt="Meathill mark" style="filter:brightness(0) invert(1) opacity(0.95);">
    </div>
  </div>
</body>
</html>
