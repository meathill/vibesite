<!doctype html>
<!-- @dsCard group="Colors" name="Neutral color scale" subtitle="Warm-tinted neutrals — no cool blue" viewport="700x280" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neutral color scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .swatch {
    aspect-ratio: 0.62 / 1;
    border-radius: var(--radius);
    border: 1px solid oklch(0.20 0.05 28 / 5%);
    display: flex; flex-direction: column;
    justify-content: flex-end; padding: 6px 6px;
    color: white; font-family: var(--font-mono);
    font-size: 9.5px; font-weight: 500;
  }
  .swatch.lo { color: var(--neutral-800); }
  .name { font-weight: 600; font-family: var(--font-sans); font-size: 11px; }
  .legend {
    margin-top: 14px;
    font-size: 12px; line-height: 1.55; color: var(--neutral-700);
  }
  .legend b { color: var(--neutral-900); font-weight: 600; }
  .legend code { background: var(--muted); }
</style>
</head>
<body class="card">
  <div class="scale">
    <div class="swatch lo" style="background: var(--neutral-0); border-color: var(--border);"><span class="name">0</span></div>
    <div class="swatch lo" style="background: var(--neutral-50)"><span class="name">50</span></div>
    <div class="swatch lo" style="background: var(--neutral-100)"><span class="name">100</span></div>
    <div class="swatch lo" style="background: var(--neutral-150)"><span class="name">150</span></div>
    <div class="swatch lo" style="background: var(--neutral-200)"><span class="name">200</span></div>
    <div class="swatch lo" style="background: var(--neutral-300)"><span class="name">300</span></div>
    <div class="swatch lo" style="background: var(--neutral-400)"><span class="name">400</span></div>
    <div class="swatch"    style="background: var(--neutral-500)"><span class="name">500</span></div>
    <div class="swatch"    style="background: var(--neutral-700)"><span class="name">700</span></div>
    <div class="swatch"    style="background: var(--neutral-800)"><span class="name">800</span></div>
    <div class="swatch"    style="background: var(--neutral-900)"><span class="name">900</span></div>
  </div>
  <p class="legend">
    Warm-tinted neutral ramp — all swatches sit on hue <code>30–60</code>, never cool blue.
    <b>50</b> is the page background, <b>0</b> is the card surface, <b>200</b> is the default border,
    <b>500</b> is muted-foreground, <b>900</b> is body text.
  </p>
</body>
</html>
