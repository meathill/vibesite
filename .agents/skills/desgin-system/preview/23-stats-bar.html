<!doctype html>
<!-- @dsCard group="Components" name="Stats bar" subtitle="Trust strip — big numbers, no decoration" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Stats bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body.card { background: var(--neutral-100); padding: 22px; }
  .stats {
    background: var(--neutral-0);
    border: 1px solid var(--border);
    border-radius: var(--radius-2xl);
    padding: 18px 22px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    box-shadow: var(--shadow-xs);
  }
  .stat { text-align: center; padding: 0 12px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: 0; }
  .stat .num {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--neutral-900);
    line-height: 1.1;
  }
  .stat .num .accent { color: var(--brand-600); }
  .stat .lbl {
    margin-top: 4px;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted-foreground);
    font-weight: 600;
  }
  .footnote { margin-top: 14px; font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
  .footnote b { color: var(--neutral-900); font-weight: 600; }
</style>
</head>
<body class="card">
  <div class="stats">
    <div class="stat">
      <div class="num">12<span class="accent">M+</span></div>
      <div class="lbl">downloads</div>
    </div>
    <div class="stat">
      <div class="num">4K</div>
      <div class="lbl">max quality</div>
    </div>
    <div class="stat">
      <div class="num">$0</div>
      <div class="lbl">to start</div>
    </div>
    <div class="stat">
      <div class="num">99.9<span class="accent">%</span></div>
      <div class="lbl">uptime</div>
    </div>
  </div>
  <div class="footnote">
    <b>Trust bar.</b> Big numbers, restrained accent on the unit suffix only. No icons,
    no chart — confidence comes from typography, not decoration.
  </div>
</body>
</html>
