<!doctype html>
<!-- @dsCard group="Components" name="Badges & status pills" subtitle="filled · status pill · counter · inline" viewport="700x260" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 11.5px;
    height: 22px;
    padding: 0 8px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
  }
  .badge.pill { border-radius: var(--radius-full); padding: 0 10px; }
  .badge .dot { width: 6px; height: 6px; border-radius: 99px; background: currentColor; }

  .b-default { background: var(--primary); color: white; }
  .b-secondary { background: var(--secondary); color: var(--secondary-foreground); }
  .b-outline { background: var(--neutral-0); color: var(--neutral-700); border-color: var(--border); }
  .b-success { background: oklch(0.66 0.16 142 / 12%); color: var(--success-700); }
  .b-warning { background: oklch(0.78 0.16 65 / 14%); color: var(--warning-700); }
  .b-danger  { background: oklch(0.50 0.23 24 / 12%); color: var(--danger-700); }
  .b-info    { background: oklch(0.55 0.04 35 / 12%); color: var(--info-700); }
  .b-premium {
    background: var(--brand-gradient); color: white;
    border-color: transparent;
    box-shadow: var(--shadow-primary);
  }

  .row { display: grid; grid-template-columns: 130px 1fr; align-items: center; gap: 12px; padding: 8px 0; }
  .row:not(:last-child) { border-bottom: 1px dashed var(--border); }
  .row b { font-family: var(--font-mono); font-size: 11px; color: var(--neutral-900); font-weight: 600; }
  .group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body class="card">
  <div class="row">
    <b>filled</b>
    <div class="group">
      <span class="badge b-default">Pro</span>
      <span class="badge b-secondary">Free</span>
      <span class="badge b-outline">Beta</span>
      <span class="badge b-premium">★ Premium</span>
    </div>
  </div>
  <div class="row">
    <b>status pill</b>
    <div class="group">
      <span class="badge pill b-success"><span class="dot"></span>done</span>
      <span class="badge pill b-warning"><span class="dot"></span>queued</span>
      <span class="badge pill b-info"><span class="dot"></span>running</span>
      <span class="badge pill b-danger"><span class="dot"></span>failed</span>
    </div>
  </div>
  <div class="row">
    <b>counter</b>
    <div class="group">
      <span class="badge b-default" style="height: 18px; padding: 0 6px; font-size: 10.5px;">3</span>
      <span class="badge b-outline" style="height: 18px; padding: 0 6px; font-size: 10.5px;">12</span>
      <span class="badge b-danger pill" style="height: 18px; padding: 0 6px; font-size: 10.5px;">99+</span>
    </div>
  </div>
  <div class="row" style="border:0;">
    <b>inline tag</b>
    <div class="group" style="font-size: 13px; color: var(--neutral-700);">
      <span>Plan</span>
      <span class="badge pill b-success">● active</span>
      <span style="color: var(--muted-foreground);">renews Dec 12</span>
    </div>
  </div>
</body>
</html>
