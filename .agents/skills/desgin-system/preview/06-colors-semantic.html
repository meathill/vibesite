<!doctype html>
<!-- @dsCard group="Colors" name="Semantic colors" subtitle="success / warning / destructive / info" viewport="700x240" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .item {
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    background: var(--neutral-0);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .chip {
    height: 60px;
    display: flex; align-items: flex-end;
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    color: white;
  }
  .body { padding: 10px 12px 12px; font-size: 11px; color: var(--neutral-700); line-height: 1.5; }
  .body b { display: block; color: var(--neutral-900); font-size: 12px; margin-bottom: 2px; }
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    border-radius: var(--radius-full);
    font-size: 10.5px; font-weight: 600;
    margin-top: 6px;
  }
</style>
</head>
<body class="card">
  <div class="grid">
    <div class="item">
      <div class="chip" style="background: var(--success-500)">success</div>
      <div class="body">
        <b>Done</b>
        Confirmations, completed jobs, save state.
        <span class="pill" style="background: oklch(0.66 0.16 142 / 12%); color: var(--success-700);">● done</span>
      </div>
    </div>
    <div class="item">
      <div class="chip" style="background: var(--warning-500)">warning</div>
      <div class="body">
        <b>Queued</b>
        Pending action, soft alerts, throttling.
        <span class="pill" style="background: oklch(0.78 0.16 65 / 14%); color: var(--warning-700);">● queued</span>
      </div>
    </div>
    <div class="item">
      <div class="chip" style="background: var(--danger-600)">destructive</div>
      <div class="body">
        <b>Failed</b>
        Errors, destructive actions, quota exceeded.
        <span class="pill" style="background: oklch(0.50 0.23 24 / 12%); color: var(--danger-700);">● failed</span>
      </div>
    </div>
    <div class="item">
      <div class="chip" style="background: var(--info-500)">info</div>
      <div class="body">
        <b>Running</b>
        Neutral notice, in-progress, system messages.
        <span class="pill" style="background: oklch(0.55 0.04 35 / 12%); color: var(--info-700);">● running</span>
      </div>
    </div>
  </div>
</body>
</html>
