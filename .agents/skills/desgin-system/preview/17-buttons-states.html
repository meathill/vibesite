<!doctype html>
<!-- @dsCard group="Components" name="Buttons — sizes & states" subtitle="xs → xl · hover / press / focus / loading / disabled" viewport="700x360" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons — sizes & states</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .btn {
    appearance: none; border: 1px solid var(--primary);
    background: var(--primary); color: var(--primary-foreground);
    font-family: var(--font-sans); font-weight: 500;
    border-radius: var(--radius-lg);
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer;
    box-shadow: var(--shadow-primary), inset 0 1px 0 rgba(255,255,255,0.16);
    transition: all var(--duration-fast) var(--ease-out);
  }
  .xs { height: 24px; padding: 0 8px;  font-size: 11.5px; border-radius: var(--radius-md); }
  .sm { height: 28px; padding: 0 10px; font-size: 12.5px; }
  .md { height: 32px; padding: 0 12px; font-size: 13px; }
  .lg { height: 36px; padding: 0 14px; font-size: 14px; }
  .xl { height: 44px; padding: 0 18px; font-size: 15px; border-radius: var(--radius-xl); }

  /* States */
  .state-hover  { background: var(--primary-hover); border-color: var(--primary-hover); }
  .state-press  { background: var(--primary-active); border-color: var(--primary-active); transform: translateY(0.5px); box-shadow: none; }
  .state-focus  { outline: 2px solid var(--ring); outline-offset: 2px; }
  .state-disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  .state-loading::before {
    content: ""; width: 12px; height: 12px;
    border: 2px solid currentColor; border-right-color: transparent;
    border-radius: 99px; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .row { display: grid; grid-template-columns: 110px 1fr; align-items: center; gap: 14px; padding: 8px 0; }
  .row:not(:last-child) { border-bottom: 1px dashed var(--border); }
  .row b { font-family: var(--font-mono); font-size: 11px; color: var(--neutral-900); font-weight: 600; }
  .row .group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body class="card">
  <div class="row">
    <b>sizes</b>
    <div class="group">
      <button class="btn xs">xs</button>
      <button class="btn sm">sm</button>
      <button class="btn md">md / default</button>
      <button class="btn lg">lg</button>
      <button class="btn xl">xl · hero</button>
    </div>
  </div>
  <div class="row">
    <b>hover</b>
    <div class="group"><button class="btn md state-hover">Hover state</button><span style="font-size:12px; color: var(--muted-foreground);">background → brand-600 / 120ms ease-out</span></div>
  </div>
  <div class="row">
    <b>press</b>
    <div class="group"><button class="btn md state-press">Pressed</button><span style="font-size:12px; color: var(--muted-foreground);">brand-700 · shadow off · 0.5px Y-shift</span></div>
  </div>
  <div class="row">
    <b>focus</b>
    <div class="group"><button class="btn md state-focus">Focused</button><span style="font-size:12px; color: var(--muted-foreground);">2px ring · 2px offset</span></div>
  </div>
  <div class="row">
    <b>loading</b>
    <div class="group"><button class="btn md state-loading">Downloading…</button></div>
  </div>
  <div class="row" style="border:0;">
    <b>disabled</b>
    <div class="group"><button class="btn md state-disabled" disabled>Unavailable</button></div>
  </div>
</body>
</html>
