<!doctype html>
<!-- @dsCard group="Components" name="Buttons — variants" subtitle="default · secondary · outline · ghost · destructive · link" viewport="700x360" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons — variants</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  /* Button system — mirrors x-downloader's button.tsx variants. */
  .btn {
    appearance: none; border: 1px solid transparent;
    font-family: var(--font-sans); font-weight: 500; font-size: 13px;
    padding: 0 12px; height: 36px;
    border-radius: var(--radius-lg);
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer;
    transition: background var(--duration-fast) var(--ease-out),
                box-shadow var(--duration-fast) var(--ease-out),
                color var(--duration-fast) var(--ease-out);
    line-height: 1;
  }
  .btn-default {
    background: var(--primary); color: var(--primary-foreground);
    border-color: var(--primary);
    box-shadow: var(--shadow-primary),
                inset 0 1px 0 rgba(255,255,255,0.16);
  }
  .btn-default:hover { background: var(--primary-hover); }
  .btn-secondary { background: var(--secondary); color: var(--secondary-foreground); }
  .btn-secondary:hover { background: var(--neutral-150); }
  .btn-outline {
    background: var(--neutral-0); color: var(--neutral-900);
    border-color: var(--border);
    box-shadow: 0 1px 0 oklch(0.20 0.05 28 / 6%);
  }
  .btn-outline:hover { background: var(--accent); }
  .btn-ghost { background: transparent; color: var(--neutral-800); }
  .btn-ghost:hover { background: var(--accent); }
  .btn-destructive {
    background: var(--destructive); color: white;
    border-color: var(--destructive);
    box-shadow: 0 1px 2px 0 oklch(0.50 0.23 24 / 14%),
                0 4px 12px -2px oklch(0.50 0.23 24 / 24%);
  }
  .btn-link {
    background: transparent; color: var(--brand-600);
    padding: 0 2px; text-decoration: none;
  }
  .btn-link:hover { text-decoration: underline; }

  .row-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); min-width: 110px; }
  .row { display: grid; grid-template-columns: 120px 1fr; align-items: center; gap: 12px; padding: 9px 0; }
  .row:not(:last-child) { border-bottom: 1px dashed var(--border); }
</style>
</head>
<body class="card">
  <div class="row">
    <span class="row-label">default</span>
    <div class="row" style="grid-template-columns: none; display: flex; gap: 8px; padding: 0; border: 0;">
      <button class="btn btn-default">Download .mp4</button>
      <button class="btn btn-default">▾ More</button>
    </div>
  </div>
  <div class="row">
    <span class="row-label">secondary</span>
    <div style="display: flex; gap: 8px;"><button class="btn btn-secondary">Get file</button><button class="btn btn-secondary">Refresh</button></div>
  </div>
  <div class="row">
    <span class="row-label">outline</span>
    <div style="display: flex; gap: 8px;"><button class="btn btn-outline">Cancel</button><button class="btn btn-outline">View invoice</button></div>
  </div>
  <div class="row">
    <span class="row-label">ghost</span>
    <div style="display: flex; gap: 8px;"><button class="btn btn-ghost">Skip</button><button class="btn btn-ghost">Dismiss</button></div>
  </div>
  <div class="row">
    <span class="row-label">destructive</span>
    <div style="display: flex; gap: 8px;"><button class="btn btn-destructive">Delete task</button></div>
  </div>
  <div class="row" style="border: 0;">
    <span class="row-label">link</span>
    <div style="display: flex; gap: 12px;"><a class="btn btn-link" href="#">View pricing →</a><a class="btn btn-link" href="#">Read docs</a></div>
  </div>
</body>
</html>
