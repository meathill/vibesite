<!doctype html>
<!-- @dsCard group="UI Kit — Comment Admin" name="UI Kit — Comment admin" subtitle="Awesome Comment moderation · batch actions · AI replies" viewport="1440x1000" -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meathill Comments · Admin</title>
<link rel="icon" href="../../assets/favicon.svg">

<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="../../shared/theme-toggle.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/fill/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/bold/style.css">

<script src="../../shared/theme-toggle.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Admin — Comments">
  <div id="app"></div>

  <script type="text/babel" src="../../shared/ThemeToggle.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="StatBar.jsx"></script>
  <script type="text/babel" src="FilterBar.jsx"></script>
  <script type="text/babel" src="BatchActions.jsx"></script>
  <script type="text/babel" src="CommentRow.jsx"></script>
  <script type="text/babel" src="AITemplateModal.jsx"></script>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const SEED = [
      {
        id: 2104,
        content: "I love the new dark mode! Though I noticed the inline code blocks in the docs look a bit washed out on OLED screens. Otherwise this is a huge UX win — thank you for shipping it so quickly after the request thread.",
        user: { name: "Jordan Liu", email: "jordan@studio.io", initial: "J", kind: "", from: "google", providerIcon: "ph-google-logo", trusted: true },
        createdAt: Date.now() - 4 * 60 * 1000,
        postId: "https://blog.meathill.com/dark-mode-launch/en/",
        tags: ["Suggestion"],
        status: "pending",
        lang: "en",
      },
      {
        id: 2103,
        content: "请问 self-host 版本支持自定义 Auth0 之外的 OAuth Provider 吗？我们公司只允许使用内部 LDAP，所以需要 OIDC 桥接。",
        translation: "Does the self-hosted version support OAuth providers other than Auth0? Our company only allows internal LDAP, so we need an OIDC bridge.",
        user: { name: "陈思源", email: "siyuan.chen@enterprise.cn", initial: "陈", kind: "b", from: "auth0", providerIcon: "ph-shield-check", trusted: false },
        createdAt: Date.now() - 11 * 60 * 1000,
        postId: "https://blog.meathill.com/self-host-guide/zh/",
        tags: ["Question"],
        status: "pending",
        lang: "zh",
        isForeign: true,
      },
      {
        id: 2102,
        content: "Found a bug — when I delete a comment in the moderation queue, the row disappears but the count badge in the sidebar doesn't refresh until I reload the page. Tested on Chrome 138 and Firefox 142.",
        user: { name: "Maya Okafor", email: "maya@indiehacker.dev", initial: "M", kind: "c", from: "github", providerIcon: "ph-github-logo", trusted: true },
        createdAt: Date.now() - 22 * 60 * 1000,
        postId: "https://blog.meathill.com/release-v0.8/en/",
        tags: ["Bug report"],
        status: "pending",
        lang: "en",
        replies: [
          { content: "Thanks Maya — confirmed, this is a stale Pinia state issue. Patch ships in v0.8.2 tomorrow.", author: "Meathill", at: Date.now() - 15 * 60 * 1000, byAI: false },
        ],
      },
      {
        id: 2101,
        content: "Genuinely the best comment system I\u2019ve integrated this year. The Google One Tap flow alone saved me a week of OAuth pain. Two cents: would love to see comment threading collapse by depth.",
        user: { name: "Pavel Sokolov", email: "pavel@build.so", initial: "P", kind: "d", from: "google", providerIcon: "ph-google-logo", trusted: false },
        createdAt: Date.now() - 38 * 60 * 1000,
        postId: "https://blog.meathill.com/announcing-awesome-comment/en/",
        tags: ["Greeting", "Suggestion"],
        status: "approved",
        lang: "en",
        replies: [
          { content: "Thank you so much, Pavel! Depth-based collapse is a great call — I\u2019ll add it to the v0.9 milestone.", author: "AI", at: Date.now() - 30 * 60 * 1000, byAI: true },
        ],
      },
      {
        id: 2100,
        content: "Buy followers cheap!!! visit my-spam-site.example for 10x growth guaranteed 💰💰💰",
        user: { name: "growthhacker22", email: "spam@junkmail.ru", initial: "g", kind: "e", from: "google", providerIcon: "ph-google-logo" },
        createdAt: Date.now() - 50 * 60 * 1000,
        postId: "https://blog.meathill.com/release-v0.8/en/",
        tags: ["Bug report"],
        status: "rejected",
        lang: "en",
        shadowBanned: true,
      },
      {
        id: 2099,
        content: "¿Cuándo van a soportar Bluesky? El AT Protocol está despegando y sería genial poder mostrar mis posts ahí en el blog.",
        translation: "When will you support Bluesky? The AT Protocol is taking off and it would be great to embed my posts here on the blog.",
        user: { name: "Lucía Martín", email: "lucia@webdev.es", initial: "L", kind: "b", from: "auth0", providerIcon: "ph-shield-check", trusted: false },
        createdAt: Date.now() - 70 * 60 * 1000,
        postId: "https://blog.meathill.com/roadmap-2026/es/",
        tags: ["Question"],
        status: "pending",
        lang: "es",
        isForeign: true,
      },
      {
        id: 2098,
        content: "The pricing page is clear and honest — appreciate not seeing a fake \"Enterprise\" tier with a Contact Sales button. Going to recommend this to my team.",
        user: { name: "Sam Reyes", email: "sam@startup.co", initial: "S", kind: "c", from: "github", providerIcon: "ph-github-logo", trusted: true },
        createdAt: Date.now() - 95 * 60 * 1000,
        postId: "https://blog.meathill.com/pricing/en/",
        tags: ["Greeting"],
        status: "approved",
        lang: "en",
      },
      {
        id: 2097,
        content: "API rate limits feel too aggressive on the free tier. I hit 429s within the first hour of testing. Bumping to 100 req/min on free would make evaluation way smoother.",
        user: { name: "Yuki Tanaka", email: "yuki@devstudio.jp", initial: "田", kind: "d", from: "google", providerIcon: "ph-google-logo" },
        createdAt: Date.now() - 130 * 60 * 1000,
        postId: "https://blog.meathill.com/api-reference/en/",
        tags: ["Criticism", "Suggestion"],
        status: "pending",
        lang: "en",
      },
    ];

    function App() {
      const [comments, setComments] = useState(SEED);
      const [selected, setSelected] = useState([]);
      const [status, setStatus] = useState('pending');
      const [lang, setLang] = useState('all');
      const [query, setQuery] = useState('');
      const [modal, setModal] = useState(false);
      const [toast, setToast] = useState(null);

      function flash(msg, kind = 'success') {
        setToast({ msg, kind });
        setTimeout(() => setToast(null), 2400);
      }

      function toggleSelect(id) {
        setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
      }
      function toggleSelectAll(visibleIds) {
        if (visibleIds.every(id => selected.includes(id))) {
          setSelected(s => s.filter(id => !visibleIds.includes(id)));
        } else {
          setSelected([...new Set([...selected, ...visibleIds])]);
        }
      }

      const counts = useMemo(() => {
        const c = { pending: 0, approved: 0, rejected: 0, all: comments.length };
        comments.forEach(x => c[x.status]++);
        return c;
      }, [comments]);

      const visible = useMemo(() => {
        return comments.filter(c => {
          if (status !== 'all' && c.status !== status) return false;
          if (lang !== 'all' && c.lang !== lang) return false;
          if (query && !(`${c.content} ${c.user.name} ${c.postId}`.toLowerCase()).includes(query.toLowerCase())) return false;
          return true;
        });
      }, [comments, status, lang, query]);

      const visibleIds = visible.map(c => c.id);
      const allChecked = visibleIds.length > 0 && visibleIds.every(id => selected.includes(id));

      function setRowStatus(ids, newStatus) {
        setComments(cs => cs.map(c => ids.includes(c.id) ? { ...c, status: newStatus } : c));
      }
      function approveOne(id)  { setRowStatus([id], 'approved'); flash(`Approved #${id}`); }
      function rejectOne(id)   { setRowStatus([id], 'rejected'); flash(`Rejected #${id}`, 'info'); }
      function shadowBanOne(id) {
        setComments(cs => cs.map(c => c.id === id ? { ...c, shadowBanned: !c.shadowBanned } : c));
        flash(`Toggled shadow ban on #${id}`);
      }
      function deleteOne(id)   {
        setComments(cs => cs.filter(c => c.id !== id));
        setSelected(s => s.filter(x => x !== id));
        flash(`Deleted #${id}`);
      }
      function replyEmoji(id, emoji) {
        setComments(cs => cs.map(c => c.id === id
          ? { ...c, replies: [...(c.replies||[]), { content: emoji, author: 'You', at: Date.now(), byAI: false }], status: 'approved' }
          : c));
        flash(`Replied ${emoji} to #${id}`);
      }
      function removeReply(id, idx) {
        setComments(cs => cs.map(c => c.id === id
          ? { ...c, replies: c.replies.filter((_, i) => i !== idx) }
          : c));
        flash(`Reply removed`);
      }
      function aiReply(id) {
        flash(`Generating AI reply for #${id}…`, 'info');
        setTimeout(() => {
          setComments(cs => cs.map(c => c.id === id
            ? { ...c, replies: [...(c.replies||[]), {
                content: 'Thanks for the thoughtful note — here\u2019s a more detailed answer based on what you described above. (Generated by GPT-4o-mini · review before sending.)',
                author: 'AI · GPT-4o-mini', at: Date.now(), byAI: true,
              }], status: 'approved' }
            : c));
          flash(`AI reply drafted for #${id}`);
        }, 1100);
      }

      function batchApprove() { setRowStatus(selected, 'approved'); flash(`Approved ${selected.length}`); setSelected([]); }
      function batchReject()  { setRowStatus(selected, 'rejected'); flash(`Rejected ${selected.length}`, 'info'); setSelected([]); }
      function batchDelete()  {
        setComments(cs => cs.filter(c => !selected.includes(c.id)));
        flash(`Deleted ${selected.length}`); setSelected([]);
      }
      function batchEmoji(emoji) {
        setComments(cs => cs.map(c => selected.includes(c.id)
          ? { ...c, replies: [...(c.replies||[]), { content: emoji, author: 'You', at: Date.now(), byAI: false }], status: 'approved' }
          : c));
        flash(`Replied ${emoji} to ${selected.length}`); setSelected([]);
      }
      function batchAITemplate() { setModal(true); }
      function pickTemplate(t) {
        setModal(false);
        flash(`Generating ${selected.length} AI replies…`, 'info');
        setTimeout(() => {
          setComments(cs => cs.map(c => selected.includes(c.id)
            ? { ...c, replies: [...(c.replies||[]), {
                content: `[${t.name}] ${t.preview}`,
                author: 'AI · GPT-4o-mini', at: Date.now(), byAI: true,
              }], status: 'approved' }
            : c));
          flash(`Drafted ${selected.length} replies with "${t.name}"`);
          setSelected([]);
        }, 1100);
      }

      return (
        <>
          <AdminHeader tab="comments" />
          <div className="page">
            <div className="page-head">
              <div>
                <h1>Comment moderation</h1>
                <p>Approve, reject, or reply with AI to every comment across your sites.</p>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-md btn-outline"><i className="ph ph-download-simple"></i> Export</button>
                <button className="btn btn-md btn-primary"><i className="ph ph-plus"></i> New site</button>
              </div>
            </div>

            <StatBar counts={counts} />

            <FilterBar
              status={status} onStatus={setStatus}
              lang={lang} onLang={setLang}
              query={query} onQuery={setQuery}
              counts={counts}
            />

            {selected.length > 0 && (
              <BatchActions
                count={selected.length}
                onEmoji={batchEmoji}
                onAITemplate={batchAITemplate}
                onApprove={batchApprove}
                onReject={batchReject}
                onDelete={batchDelete}
              />
            )}

            <div className="table-card">
              <table className="comments">
                <thead>
                  <tr>
                    <th className="check">
                      <span className={'cb' + (allChecked ? ' checked' : '')} onClick={() => toggleSelectAll(visibleIds)}>
                        {allChecked && <i className="ph-bold ph-check"></i>}
                      </span>
                    </th>
                    <th>ID</th>
                    <th>Comment</th>
                    <th>User</th>
                    <th>Time</th>
                    <th>Post</th>
                    <th>Tags</th>
                    <th>Status</th>
                    <th style={{ textAlign: 'right' }}>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {visible.map((c) => (
                    <CommentRow
                      key={c.id} c={c}
                      selected={selected.includes(c.id)}
                      onSelect={toggleSelect}
                      onApprove={approveOne}
                      onReject={rejectOne}
                      onDelete={deleteOne}
                      onShadowBan={shadowBanOne}
                      onReply={replyEmoji}
                      onRemoveReply={removeReply}
                      onAIReply={aiReply}
                    />
                  ))}
                  {visible.length === 0 && (
                    <tr>
                      <td colSpan={9} style={{ textAlign: 'center', padding: '56px 24px', color: 'var(--muted-foreground)' }}>
                        <i className="ph ph-tray" style={{ fontSize: 40, opacity: 0.4 }}></i>
                        <p style={{ marginTop: 12, fontSize: 13.5 }}>No comments match this filter.</p>
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          <AITemplateModal open={modal} onClose={() => setModal(false)} onPick={pickTemplate} />

          {toast && (
            <div className={`toast ${toast.kind}`}>
              <i className={`ph-fill ${toast.kind === 'success' ? 'ph-check-circle' : 'ph-info'}`}></i>
              {toast.msg}
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
