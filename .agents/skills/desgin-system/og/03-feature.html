<!doctype html>
<!-- @dsCard group="Brand" name="OG image — Product feature" viewport="1200x630" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>OG · Feature</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="og.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.2/src/fill/style.css">
</head>
<body>
  <div class="og-bg"></div>
  <div class="og-top-line"></div>
  <div class="og-frame" style="flex-direction: row; align-items: center; padding: 64px 80px;">

    <!-- Left: copy -->
    <div style="flex: 1; max-width: 720px;">
      <div class="og-brand" style="margin-bottom: 36px;">
        <div class="mark">M</div>
        Meathill
      </div>
      <div class="og-eyebrow">Built for agents</div>
      <h1 class="og-title" style="margin: 16px 0 0; font-size: 64px; line-height: 1.05;">
        MCP server, CLI, llms.txt.
      </h1>
      <p class="og-subtitle" style="margin-top: 20px; font-size: 22px; line-height: 1.5;">
        One endpoint, one OAuth scope. Your AI agent submits download jobs without glue code.
      </p>
      <div style="margin-top: 36px; display: flex; gap: 10px; font-family: var(--font-sans); font-size: 16px; font-weight: 600;">
        <span style="background: var(--card); border: 1px solid var(--border); padding: 8px 14px; border-radius: 99px; color: var(--foreground);">
          <i class="ph ph-plug" style="margin-right: 6px; color: var(--brand-600);"></i> MCP
        </span>
        <span style="background: var(--card); border: 1px solid var(--border); padding: 8px 14px; border-radius: 99px; color: var(--foreground);">
          <i class="ph ph-terminal" style="margin-right: 6px; color: var(--brand-600);"></i> CLI
        </span>
        <span style="background: var(--card); border: 1px solid var(--border); padding: 8px 14px; border-radius: 99px; color: var(--foreground);">
          <i class="ph ph-file-text" style="margin-right: 6px; color: var(--brand-600);"></i> llms.txt
        </span>
        <span style="background: var(--card); border: 1px solid var(--border); padding: 8px 14px; border-radius: 99px; color: var(--foreground);">
          <i class="ph ph-code" style="margin-right: 6px; color: var(--brand-600);"></i> REST
        </span>
      </div>
    </div>

    <!-- Right: terminal mock -->
    <div style="width: 420px; flex: 0 0 420px; margin-left: 60px;">
      <div style="background: oklch(0.18 0.012 30); border-radius: 18px; padding: 24px 22px; font-family: var(--font-mono); font-size: 15px; color: oklch(0.92 0.01 50); line-height: 1.8; box-shadow: 0 24px 48px -8px rgba(40,20,10,0.20);">
        <div style="display: flex; gap: 6px; margin-bottom: 18px;">
          <span style="width:11px; height:11px; border-radius:99px; background:#ff5f57;"></span>
          <span style="width:11px; height:11px; border-radius:99px; background:#febc2e;"></span>
          <span style="width:11px; height:11px; border-radius:99px; background:#28c840;"></span>
        </div>
        <div style="color: oklch(0.55 0.02 30);"># start a job from your agent</div>
        <div><span style="color: oklch(0.78 0.16 28);">$ </span>x-downloader</div>
        <div style="padding-left: 14px; color: oklch(0.80 0.13 142);">"https://x.com/sama/status/123"</div>
        <div style="color: oklch(0.55 0.02 30); margin-top: 8px;"># →</div>
        <div>job #<span style="color: oklch(0.78 0.16 28);">1942</span> queued</div>
        <div>● running</div>
        <div><span style="color: oklch(0.70 0.16 142);">✓ done</span> · 89.4 MB</div>
      </div>
    </div>

  </div>
</body>
</html>
