<!doctype html>
<!-- @dsCard group="Brand" name="OG image — Article" viewport="1200x630" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>OG · Article</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="og.css">
</head>
<body>
  <div class="og-bg"></div>
  <div class="og-top-line"></div>
  <div class="og-grid"></div>
  <div class="og-frame">

    <div class="og-brand">
      <div class="mark">M</div>
      Meathill <span style="font-size: 14px; font-weight: 600; color: var(--brand-700); background: oklch(0.62 0.22 32 / 10%); padding: 4px 10px; border-radius: 99px; margin-left: 4px;">Engineering blog</span>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 1000px;">
      <div class="og-eyebrow">Deep dive · May 2026</div>
      <h1 class="og-title" style="margin: 18px 0 0; font-size: 72px; line-height: 1.05;">
        How we cut p99 download latency by 64% with Cloudflare Queues.
      </h1>
    </div>

    <!-- Author + reading time -->
    <div class="og-footer-row" style="font-size: 20px;">
      <div style="display: flex; align-items: center; gap: 16px;">
        <div style="width: 52px; height: 52px; border-radius: 99px; background: var(--brand-gradient); color: white; display: grid; place-items: center; font-weight: 700; font-size: 20px;">M</div>
        <div style="line-height: 1.3;">
          <div style="color: var(--foreground); font-weight: 600;">Meathill Zhai</div>
          <div style="font-size: 15px; color: var(--muted-foreground);">8 min read · Engineering</div>
        </div>
      </div>
      <div class="og-url">blog.meathill.com</div>
    </div>

  </div>
</body>
</html>
